name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./Oppgave2/vite-project/package-lock.json
      - name: Run npm ci
        run: npm ci
        working-directory: ./Oppgave2/vite-project
      - name: Run npm build
        run: npm run build --if-present
        working-directory: ./Oppgave2/vite-project
      - name: Run npm test
        run: npm test
        working-directory: ./Oppgave2/vite-project
